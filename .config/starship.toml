"$schema" = 'https://starship.rs/config-schema.json'

format = """
[έΨΣέΨΤέΨΥέΨΥ](fg:grey)\
$os\
[ΌΓ▒](bg:grey fg:light_grey)\
$username\
[ΌΓ░](fg:grey bg:blue)\
$directory\
[ΌΓ░](fg:blue bg:green)\
$git_branch\
$git_status\
[ΌΓ░](fg:green bg:grey)\
$c\
$rust\
$golang\
$nodejs\
$bun\
$php\
$java\
$kotlin\
$haskell\
$python\
$docker_context\
$conda\
$cmd_duration\
[ΌΓ░](fg:grey bg:blue)\
$time\
[έΨΥέΨΥέΨΤέΨΣ](fg:blue)\
$line_break\
$character"""

palette = 'p10k_default'

[palettes.p10k_default]
grey = "#444444"
light_grey = "#6c6c6c"
blue = "#005faf"
green = "#5fd700"
yellow = "#d7af00"
red = "#d70000"
white = "#e4e4e4"
black = "#000000"

[os]
disabled = false
style = "bg:grey fg:white"
format = "[$symbol ]($style)"

[os.symbols]
Windows = "ΌεΠ"
Ubuntu = "≤░ΧΙ"
SUSE = "ΎΝΦ"
Raspbian = "≤░Ρ┐"
Mint = "≤░μφ"
Macos = "≤░Α╡"
Manjaro = "ΎΝΤ"
Linux = "ΌψΗ"
Gentoo = "≤░μρ"
Fedora = "≤░μδ"
Alpine = "ΎΝΑ"
Amazon = "ΎΚ░"
Android = "ΌεΟ"
AOSC = "ΎΝΒ"
Arch = "≤░μΘ"
Artix = "≤░μΘ"
CentOS = "ΎΝΕ"
Debian = "≤░μγ"
Redhat = "≤▒Εδ"
RedHatEnterprise = "≤▒Εδ"
Pop = "≤░ΧΙ"

[username]
show_always = true
style_user = "bg:grey fg:white"
style_root = "bg:grey fg:white"
format = "[ $user]($style)"

[directory]
style = "bg:blue fg:white"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "έΑο/"

[directory.substitutions]
"Documents" = "≤░Ιβ "
"Downloads" = "ΎΑβ "
"Music" = "≤░ζγ "
"Pictures" = "ΎΑ╛ "
"Developer" = "≤░▓Μ "

[git_branch]
symbol = "ΎΡα"
format = "[ $symbol $branch ](fg:#111111 bg:green)"

[git_status]
style = "bg:green fg:black"
format = "[($all_status$ahead_behind )]($style)"

[nodejs]
symbol = "Όεα"
style = "bg:grey fg:white"
format = "[ $symbol( $version) ]($style)"

[bun]
symbol = "Όζψ"
style = "bg:grey fg:white"
format = "[ $symbol( $version) ]($style)"

[c]
symbol = "Όαη "
style = "bg:grey fg:white"
format = "[ $symbol( $version) ]($style)"

[rust]
symbol = "Όηρ"
style = "bg:grey fg:white"
format = "[ $symbol( $version) ]($style)"

[golang]
symbol = "Όαπ"
style = "bg:grey fg:white"
format = "[ $symbol( $version) ]($style)"

[php]
symbol = "ΌαΙ"
style = "bg:grey fg:white"
format = "[ $symbol( $version) ]($style)"

[java]
symbol = "ΌΚΨ "
style = "bg:grey fg:white"
format = "[ $symbol( $version) ]($style)"

[kotlin]
symbol = "Όα┤"
style = "bg:grey fg:white"
format = "[ $symbol( $version) ]($style)"

[haskell]
symbol = "Όαθ"
style = "bg:grey fg:white"
format = "[ $symbol( $version) ]($style)"

[python]
symbol = "ΌαΗ"
style = "bg:grey fg:white"
format = "[ $symbol( $version)(\\(#$virtualenv\\)) ]($style)"

[docker_context]
symbol = "ΎΝΙ"
style = "bg:grey fg:white"
format = "[ $symbol( $context) ]($style)"

[conda]
symbol = " ΎΕΝ "
style = "bg:grey fg:white"
format = "[$symbol$environment ]($style)"
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "bg:blue fg:white"
format = "[ΎΡ║ $time ]($style)"

[cmd_duration]
show_milliseconds = true
format = "[Ότ┤ $duration ]($style)"
style = "bg:grey fg:white"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[line_break]
disabled = false

[character]
disabled = false
success_symbol = "[έζψ](bold fg:green)"
error_symbol = "[έζψ](bold fg:red)"
vimcmd_symbol = "[έζχ](bold fg:green)"
vimcmd_replace_one_symbol = "[έζχ](bold fg:blue)"
vimcmd_replace_symbol = "[έζχ](bold fg:blue)"
vimcmd_visual_symbol = "[έζχ](bold fg:yellow)"
